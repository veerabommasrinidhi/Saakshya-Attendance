<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Saakshya</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }
        
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .dashboard-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        
        .dashboard-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
        }
        
        .stats-card {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
        }
        
        .stats-number {
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stats-label {
            color: #a0a0a0;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .progress-custom {
            height: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
        }
        
        .progress-bar-custom {
            background: linear-gradient(90deg, #667eea, #764ba2);
            font-weight: bold;
            line-height: 30px;
        }
        
        .attendance-status {
            font-size: 14px;
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
        }
        
        .status-good {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border-left: 3px solid #10b981;
        }
        
        .status-warning {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border-left: 3px solid #f59e0b;
        }
        
        .status-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-left: 3px solid #ef4444;
        }
        
        .table {
            color: white;
        }
        
        .table thead th {
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            color: #667eea;
        }
        
        .badge-present {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            padding: 5px 12px;
            border-radius: 20px;
        }
        
        .badge-absent {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 5px 12px;
            border-radius: 20px;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-fade-in {
            animation: fadeInUp 0.6s ease;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #667eea;
        }
        
        .welcome-message {
            font-size: 24px;
            margin-bottom: 30px;
        }
        
        .welcome-message i {
            color: #667eea;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <span class="navbar-brand">
                <i class="fas fa-user-graduate me-2"></i>
                Saakshya Student
            </span>
            <button class="btn btn-outline-light" onclick="logout()">
                <i class="fas fa-sign-out-alt me-2"></i>Logout
            </button>
        </div>
    </nav>
    
    <div class="container mt-4">
        <div class="welcome-message animate-fade-in">
            <i class="fas fa-smile-wink"></i>
            Welcome, <span id="studentName">Student</span>!
        </div>
        
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="stats-card animate-fade-in">
                    <div class="stats-number" id="totalClasses">0</div>
                    <div class="stats-label">Total Classes</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card animate-fade-in">
                    <div class="stats-number" id="classesAttended">0</div>
                    <div class="stats-label">Classes Attended</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card animate-fade-in">
                    <div class="stats-number" id="attendancePercentage">0%</div>
                    <div class="stats-label">Attendance Percentage</div>
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-6">
                <div class="dashboard-card animate-fade-in">
                    <div class="section-title">
                        <i class="fas fa-chart-line me-2"></i>Attendance Progress
                    </div>
                    <div class="progress progress-custom mb-3">
                        <div class="progress-bar progress-bar-custom" id="attendanceProgressBar" style="width: 0%">0%</div>
                    </div>
                    <div class="attendance-status" id="attendanceStatus"></div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="dashboard-card animate-fade-in">
                    <div class="section-title">
                        <i class="fas fa-chart-pie me-2"></i>Attendance Overview
                    </div>
                    <canvas id="attendanceChart" height="200"></canvas>
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-12">
                <div class="dashboard-card animate-fade-in">
                    <div class="section-title">
                        <i class="fas fa-history me-2"></i>Recent Attendance Records
                    </div>
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                 <tr>
                                    <th>Date</th>
                                    <th>Time</th>
                                    <th>Status</th>
                                    <th>Confidence</th>
                                </tr>
                            </thead>
                            <tbody id="attendanceRecords">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let attendanceChart = null;
        
        async function loadStudentData() {
            try {
                const response = await fetch('/api/student_attendance');
                const result = await response.json();
                
                if (result.success) {
                    const data = result.data;
                    document.getElementById('totalClasses').textContent = data.total_classes;
                    document.getElementById('classesAttended').textContent = data.present;
                    document.getElementById('attendancePercentage').textContent = `${data.percentage}%`;
                    
                    const progressBar = document.getElementById('attendanceProgressBar');
                    progressBar.style.width = `${data.percentage}%`;
                    progressBar.textContent = `${data.percentage}%`;
                    
                    const statusDiv = document.getElementById('attendanceStatus');
                    if (data.percentage >= 75) {
                        statusDiv.innerHTML = '<i class="fas fa-trophy me-2"></i> Excellent! You have good attendance. Keep it up!';
                        statusDiv.className = 'attendance-status status-good';
                    } else if (data.percentage >= 50) {
                        statusDiv.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i> Your attendance is average. Try to improve.';
                        statusDiv.className = 'attendance-status status-warning';
                    } else {
                        statusDiv.innerHTML = '<i class="fas fa-skull-crossbones me-2"></i> Warning: Your attendance is below 50%! Please attend more classes.';
                        statusDiv.className = 'attendance-status status-danger';
                    }
                    
                    updateChart(data.present, data.absent);
                    
                    if (result.recent) {
                        loadRecentRecords(result.recent);
                    }
                }
            } catch (error) {
                console.error('Error loading student data:', error);
            }
        }
        
        function updateChart(present, absent) {
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            
            if (attendanceChart) {
                attendanceChart.destroy();
            }
            
            attendanceChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Present', 'Absent'],
                    datasets: [{
                        data: [present, absent],
                        backgroundColor: ['#10b981', '#ef4444'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#ffffff' }
                        }
                    }
                }
            });
        }
        
        function loadRecentRecords(records) {
            const tbody = document.getElementById('attendanceRecords');
            tbody.innerHTML = '';
            
            if (records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center">No attendance records found</td></tr>';
                return;
            }
            
            records.forEach(record => {
                const statusClass = record.status === 'present' ? 'badge-present' : 'badge-absent';
                const statusText = record.status === 'present' ? 'Present' : 'Absent';
                const confidence = record.confidence ? `${record.confidence}%` : '-';
                
                tbody.innerHTML += `
                    <tr>
                        <td>${record.date}</td>
                        <td>${record.time_in}</td>
                        <td><span class="${statusClass}">${statusText}</span></td>
                        <td>${confidence}</td>
                    </tr>
                `;
            });
        }
        
        async function logout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/login';
            } catch (error) {
                console.error('Error logging out:', error);
            }
        }
        
        document.getElementById('studentName').textContent = localStorage.getItem('studentName') || 'Student';
        loadStudentData();
        setInterval(loadStudentData, 30000);
    </script>
</body>
</html>
